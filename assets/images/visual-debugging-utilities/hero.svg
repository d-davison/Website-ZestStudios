<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Visual Debugging Utilities">
  <defs>
    <linearGradient id="vdu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12161d"/>
      <stop offset="100%" stop-color="#0b0e13"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#vdu)"/>
  <!-- grid floor -->
  <g stroke="#243040" stroke-width="2" opacity="0.5">
    <path d="M0 720 L1600 720"/><path d="M0 800 L1600 800"/><path d="M0 890 L1600 890"/>
    <path d="M300 700 L120 1000"/><path d="M620 700 L560 1000"/><path d="M980 700 L1040 1000"/><path d="M1300 700 L1480 1000"/>
  </g>
  <!-- HUD debug messages (on-screen) -->
  <g font-family="Consolas,Menlo,monospace" font-size="30">
    <text x="90" y="130" fill="#ffe14d">Speed: 42.0</text>
    <text x="90" y="180" fill="#57e389">Grounded: true</text>
    <text x="90" y="230" fill="#5ac8ff">Targets in range: 3</text>
    <text x="90" y="280" fill="#ff6b6b">No path found</text>
  </g>
  <!-- world-space debug shapes -->
  <!-- wireframe sphere -->
  <g stroke="#57e389" stroke-width="4" fill="none" opacity="0.9">
    <circle cx="1230" cy="300" r="120"/>
    <ellipse cx="1230" cy="300" rx="120" ry="44"/>
    <ellipse cx="1230" cy="300" rx="44" ry="120"/>
  </g>
  <!-- wireframe cube -->
  <g stroke="#5ac8ff" stroke-width="4" fill="none" opacity="0.9">
    <path d="M1030 520 l120 0 l0 120 l-120 0 z"/>
    <path d="M1090 470 l120 0 l0 120 l-120 0 z"/>
    <path d="M1030 520 l60 -50 M1150 520 l60 -50 M1150 640 l60 -50 M1030 640 l60 -50"/>
  </g>
  <!-- arrow -->
  <g stroke="#ff5ac8" stroke-width="6" fill="#ff5ac8" opacity="0.9">
    <path d="M1300 560 L1440 470" stroke-linecap="round"/>
    <path d="M1440 470 l-42 4 l20 34 z"/>
  </g>
  <!-- title -->
  <g fill="#ffffff" font-family="Arial,Helvetica,sans-serif" text-anchor="middle">
    <text x="560" y="560" font-size="118" font-weight="800" letter-spacing="2">VISUAL DEBUGGING</text>
    <text x="560" y="680" font-size="118" font-weight="800" letter-spacing="10">UTILITIES</text>
    <text x="560" y="742" font-size="34" font-weight="600" fill="#9fb0c3">Unreal-style on-screen &amp; world debug drawing for Unity</text>
  </g>
  <g font-family="Arial,Helvetica,sans-serif"><rect x="390" y="900" width="340" height="46" rx="23" fill="#000000" opacity="0.35"/><text x="560" y="931" fill="#ffffff" font-size="23" text-anchor="middle" opacity="0.85">PLACEHOLDER — replace me</text></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Shapes render always on top placeholder">
  <rect width="1600" height="1000" fill="#12161d"/>
  <!-- ground grid -->
  <g stroke="#2a3646" stroke-width="2" opacity="0.8">
    <path d="M0 700 L1600 700"/><path d="M0 810 L1600 810"/><path d="M0 940 L1600 940"/>
    <path d="M500 680 L360 1000"/><path d="M820 680 L780 1000"/><path d="M1120 680 L1220 1000"/>
  </g>
  <!-- solid wall in the foreground (occluder) -->
  <path d="M560 300 l520 -80 l0 560 l-520 80 z" fill="#232c3a" stroke="#3a475c" stroke-width="3"/>
  <text x="820" y="560" fill="#4a586e" font-family="Arial,Helvetica,sans-serif" font-size="34" text-anchor="middle" transform="rotate(-6 820 560)">Wall</text>
  <!-- sphere BEHIND the wall but drawn fully on top -->
  <g stroke="#57e389" stroke-width="6" fill="none">
    <circle cx="820" cy="470" r="150"/><ellipse cx="820" cy="470" rx="150" ry="52"/><ellipse cx="820" cy="470" rx="52" ry="150"/>
  </g>
  <!-- callout -->
  <g>
    <path d="M980 360 L1200 250" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <rect x="1150" y="205" width="360" height="90" rx="12" fill="#0e1319" stroke="#57e389" stroke-width="2"/>
    <text x="1330" y="250" fill="#57e389" font-family="Arial,Helvetica,sans-serif" font-size="27" text-anchor="middle" font-weight="700">Always on top</text>
    <text x="1330" y="280" fill="#aeb4c6" font-family="Arial,Helvetica,sans-serif" font-size="20" text-anchor="middle">visible through geometry</text>
  </g>
  <g font-family="Arial,Helvetica,sans-serif"><rect x="1160" y="900" width="380" height="46" rx="23" fill="#000000" opacity="0.45"/><text x="1350" y="931" fill="#fff" font-size="23" text-anchor="middle" opacity="0.9">Always-on-top (placeholder)</text></g>
</svg>

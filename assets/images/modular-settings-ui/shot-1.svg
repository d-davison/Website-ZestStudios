<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Settings panel placeholder">
  <rect width="1600" height="1000" fill="#0f1115"/>
  <rect x="110" y="96" width="1380" height="808" rx="14" fill="#191c22" stroke="#2a2f39" stroke-width="2"/>
  <!-- title bar -->
  <rect x="110" y="96" width="1380" height="66" rx="14" fill="#22262f"/><rect x="110" y="130" width="1380" height="32" fill="#22262f"/>
  <text x="150" y="138" fill="#e9edf3" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="700">Settings</text>
  <!-- category tabs -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="24">
    <rect x="150" y="196" width="150" height="52" rx="8" fill="#8b7bff"/><text x="225" y="230" fill="#fff" text-anchor="middle" font-weight="700">Audio</text>
    <text x="330" y="230" fill="#8b90a6">Graphics</text><text x="500" y="230" fill="#8b90a6">Gameplay</text><text x="690" y="230" fill="#8b90a6">Controls</text>
  </g>
  <!-- widgets column -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="26">
    <text x="150" y="330" fill="#dfe4ec">Master Volume</text>
    <rect x="150" y="350" width="560" height="12" rx="6" fill="#3a3f52"/><rect x="150" y="350" width="410" height="12" rx="6" fill="#8b7bff"/><circle cx="560" cy="356" r="17" fill="#fff"/>
    <text x="150" y="440" fill="#dfe4ec">Music Volume</text>
    <rect x="150" y="460" width="560" height="12" rx="6" fill="#3a3f52"/><rect x="150" y="460" width="300" height="12" rx="6" fill="#8b7bff"/><circle cx="450" cy="466" r="17" fill="#fff"/>
    <text x="150" y="550" fill="#dfe4ec">Subtitles</text>
    <rect x="620" y="524" width="90" height="44" rx="22" fill="#8b7bff"/><circle cx="688" cy="546" r="16" fill="#fff"/>
    <text x="150" y="640" fill="#dfe4ec">Output Device</text>
    <rect x="440" y="612" width="270" height="46" rx="8" fill="#262a3b" stroke="#3a3f52"/><text x="462" y="643" fill="#c9cfe6" font-size="22">Speakers (Realtek)</text><path d="M672 630 l16 0 l-8 12 z" fill="#c9cfe6"/>
    <text x="150" y="730" fill="#dfe4ec">Voice Volume</text>
    <rect x="150" y="750" width="560" height="12" rx="6" fill="#3a3f52"/><rect x="150" y="750" width="200" height="12" rx="6" fill="#8b7bff"/><circle cx="350" cy="756" r="17" fill="#fff"/>
  </g>
  <!-- description panel -->
  <rect x="800" y="300" width="640" height="480" rx="12" fill="#12151d" stroke="#2a2f39"/>
  <text x="832" y="360" fill="#8b7bff" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="700">Master Volume</text>
  <g font-family="Arial,Helvetica,sans-serif" font-size="24" fill="#aeb4c6">
    <text x="832" y="410">Overall loudness of the game.</text>
    <text x="832" y="446">Affects all other audio channels.</text>
  </g>
  <rect x="832" y="480" width="150" height="40" rx="20" fill="#1f3a2a"/><text x="907" y="507" fill="#57e389" font-family="Arial,Helvetica,sans-serif" font-size="21" text-anchor="middle">Instant save</text>
  <g font-family="Arial,Helvetica,sans-serif"><rect x="1150" y="826" width="290" height="44" rx="22" fill="#000000" opacity="0.4"/><text x="1295" y="856" fill="#fff" font-size="22" text-anchor="middle" opacity="0.85">Settings panel (placeholder)</text></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Modular Settings UI">
  <defs>
    <linearGradient id="msu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a2a63"/>
      <stop offset="100%" stop-color="#171a2b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#msu)"/>
  <!-- decorative widgets on the right -->
  <g opacity="0.9">
    <!-- slider -->
    <rect x="1080" y="180" width="360" height="12" rx="6" fill="#4b4f6b"/><rect x="1080" y="180" width="230" height="12" rx="6" fill="#8b7bff"/><circle cx="1310" cy="186" r="18" fill="#ffffff"/>
    <!-- toggle on -->
    <rect x="1080" y="270" width="96" height="46" rx="23" fill="#8b7bff"/><circle cx="1153" cy="293" r="17" fill="#ffffff"/>
    <!-- dropdown -->
    <rect x="1210" y="270" width="230" height="46" rx="8" fill="#2a2e45" stroke="#4b4f6b"/><text x="1234" y="301" fill="#c9cfe6" font-family="Arial,Helvetica,sans-serif" font-size="24">1920 x 1080</text><path d="M1400 288 l16 0 l-8 12 z" fill="#c9cfe6"/>
    <!-- toggle off -->
    <rect x="1080" y="360" width="96" height="46" rx="23" fill="#41455f"/><circle cx="1103" cy="383" r="17" fill="#c9cfe6"/>
    <!-- slider 2 -->
    <rect x="1210" y="378" width="230" height="12" rx="6" fill="#4b4f6b"/><rect x="1210" y="378" width="150" height="12" rx="6" fill="#8b7bff"/><circle cx="1360" cy="384" r="18" fill="#ffffff"/>
  </g>
  <!-- title -->
  <g fill="#ffffff" font-family="Arial,Helvetica,sans-serif" text-anchor="middle">
    <text x="720" y="470" font-size="150" font-weight="800" letter-spacing="2">MODULAR</text>
    <text x="720" y="620" font-size="150" font-weight="800" letter-spacing="2">SETTINGS UI</text>
    <text x="720" y="694" font-size="34" font-weight="600" fill="#cbc3f0">Data-driven settings menus for Unity</text>
  </g>
  <g font-family="Arial,Helvetica,sans-serif"><rect x="550" y="900" width="340" height="46" rx="23" fill="#000000" opacity="0.3"/><text x="720" y="931" fill="#ffffff" font-size="23" text-anchor="middle" opacity="0.85">PLACEHOLDER — replace me</text></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Better Logger placeholder">
  <defs>
    <linearGradient id="blg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e8f86"/>
      <stop offset="55%" stop-color="#1aa46a"/>
      <stop offset="100%" stop-color="#39c66d"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#blg)"/>
  <g fill="#ffffff" opacity="0.12" font-family="Consolas,Menlo,monospace" font-size="27">
    <text x="1120" y="120">[Gameplay] player spawned</text>
    <text x="1120" y="172">[AI] path found</text>
    <text x="1120" y="224">[Networking] connected 24ms</text>
    <text x="1120" y="276">[UI] menu opened</text>
    <text x="1120" y="328">[Gameplay] score +10</text>
    <text x="1120" y="380">[AI] target acquired</text>
    <text x="1120" y="432">[Networking] packet ok</text>
    <text x="1120" y="484">[UI] settings closed</text>
    <text x="1120" y="536">[Gameplay] level complete</text>
    <text x="1120" y="588">[AI] retreating</text>
    <text x="1120" y="640">[Networking] disconnect</text>
    <text x="1120" y="692">[UI] toast shown</text>
  </g>
  <g fill="#ffffff" font-family="Arial,Helvetica,sans-serif" text-anchor="middle">
    <text x="780" y="470" font-size="205" font-weight="800" letter-spacing="6">BETTER</text>
    <text x="780" y="670" font-size="205" font-weight="800" letter-spacing="6">LOGGER</text>
    <text x="780" y="752" font-size="43" font-weight="600" opacity="0.95">Type-safe channel logging for Unity</text>
  </g>
  <g text-anchor="middle" font-family="Arial,Helvetica,sans-serif">
    <rect x="610" y="892" width="340" height="48" rx="24" fill="#000000" opacity="0.26"/>
    <text x="780" y="924" fill="#ffffff" font-size="24" opacity="0.92">PLACEHOLDER — replace me</text>
  </g>
</svg>
